<!DOCTYPE html>
<html>
    <head>
        <title>Asset "{{ .AssetName }}"</title>
        <link rel="stylesheet" href="/static/css/audio_player.css"/>
        <link rel="icon" href="/static/images/favicon.png"/>
        <link rel="icon" href="/favicon.ico"/>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <meta name="author" content="Superduperdev2 Inc."/>
        <meta http-equiv="X-UA-Compatible" content="IE=edge,requiresActiveX=true" />
        <meta name="description" content="A Roblox Audio asset loaded from the Insert Cloud"/>
        <meta property="og:image" content="{{ .ThumbnailUrl }}"/>
        <meta property="og:title" content="{{ .AssetName }}"/>
        <meta property="og:type" content="website"/>
        <meta property="og:site_name" content="Superduperdev2 Inc. Insert Cloud"/>
        <meta property="og:audio" content="https://ic-siwebservices.com{{ .CacheSource }}"/>
        <meta property="og:description" content="A Roblox Audio asset loaded from the Insert Cloud"/>
        <meta property="twitter:image" content="{{ .ThumbnailUrl }}"/>
        <meta property="twitter:title" content="{{ .AssetName }}"/>
        <meta property="twitter:description" content="A Roblox Audio asset loaded from the Insert Cloud"/>
    </head>
    <body>
        <canvas id="visualizer"></canvas>
        <h1 class="asset_title">{{ .AssetName }} ({{ .AssetId }})</h1>
        <h1 class="asset_moderated_message" hidden>Asset is private, archived, or has been moderated</h1>
        <div id="mediaPlayerControls">
            <audio id="playable" src="" controls hidden></audio>
            <div id="picture"></div>
            <div id="icon_playpause" class="media_icon icon_play"></div>
            <input id="slider_time" type="range" value="0"/>
        </div>
        <script id="mediaPlayerHandler">fetch("{{ .CacheSource }}",{method:"GET",headers:{Accept:"application/json"}}).then(e=>{if(e.ok){return e.arrayBuffer()}else{console.log(`Failed to fetch due to a request error: ${e.statusText} (${e.status})`)}},e=>{console.log("Failed to fetch due to an error: "+toString(e))}).then(e=>{let o=new Blob([e],{type:"audio/ogg"});let t=URL.createObjectURL(o);let l=document.getElementById("playable");l.src=t},()=>{console.log("Text Conversion Failed.")});window.addEventListener("load",(function(e){var n,t,i,a,d,c=document.getElementById("picture"),r=document.getElementById("icon_playpause"),o=document.getElementById("slider_time"),u=document.getElementById("playable"),l=document.getElementById("visualizer"),m=!1;u.load(),c.style.backgroundImage="url('{{ .ThumbnailUrl }}')",u.addEventListener("timeupdate",(function(){o.value=u.currentTime,o.max=u.duration})),o.addEventListener("change",(function(){u.currentTime=o.value})),u.addEventListener("ended",(function(e){o.value=o.max})),u.addEventListener("pause",(function(e){m=!1,r.className="media_icon icon_play"})),u.addEventListener("play",(function(e){m=!0,r.className="media_icon icon_pause"})),r.addEventListener("click",(function(e){n||(n=new AudioContext,t=n.createMediaElementSource(u),(i=new AnalyserNode(n)).fftSize=256,i.maxDecibels=-4,t.connect(i),i.connect(n.destination),a=i.frequencyBinCount,d=new Uint8Array(a),function(){l.width=window.innerWidth,l.height=window.innerHeight;var e=l.getContext("2d");!function n(){i.getByteFrequencyData(d),l.width=window.innerWidth,l.height=window.innerHeight;var t=l.width,c=l.height,r=t/a;e.clearRect(0,0,t,c);for(var o=0;o<a;o++){var u=d[o]/255*(.6*c),m=r*o;e.fillStyle=`rgb(${u+100} 50 50)`,renderWidth=r-2,renderWidth<1&&(renderWidth=1),e.fillRect(m,0,renderWidth,u)}window.requestAnimationFrame(n)}()}()),m?(m=!1,r.className="media_icon icon_play",u.pause()):(m=!0,r.className="media_icon icon_pause",u.play())}))}))</script>
    </body>
</html>
